version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: congress-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-congress_graph}
      POSTGRES_USER: ${POSTGRES_USER:-congress_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-congress_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-congress_user} -d ${POSTGRES_DB:-congress_graph}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: congress-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-neo4j_password}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: congress-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-congress_graph}
      POSTGRES_USER: ${POSTGRES_USER:-congress_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-congress_password}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      ENABLE_LLM: ${ENABLE_LLM:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      ENABLE_REAL_ETL: ${ENABLE_REAL_ETL:-false}
      DEFAULT_GRAPH_LIMIT: ${DEFAULT_GRAPH_LIMIT:-200}
      MAX_GRAPH_LIMIT: ${MAX_GRAPH_LIMIT:-500}
      MAX_GRAPH_DEPTH: ${MAX_GRAPH_DEPTH:-2}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: congress-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
